<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Finance Brasil - RAG Search (RxDB Local Edition)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #004d40;
            color: white;
            padding: 20px;
            text-align: center;
        }

        #status-text {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .user-msg {
            background: #e0f2f1;
            color: #004d40;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .bot-msg {
            background: #f1f1f1;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .system-msg {
            background: #fff3e0;
            color: #e65100;
            align-self: center;
            font-size: 0.9rem;
            text-align: center;
        }

        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
            background: #fafafa;
        }

        textarea {
            flex: 1;
            resize: none;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 10px;
            height: 50px;
            font-size: 1rem;
        }

        button {
            background: #004d40;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 25px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:disabled,
        textarea:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background: #00332a;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <header>
            <h2>Open Finance Explorer (Local RAG)</h2>
            <p id="status-text">Bootstrapping Database Architecture...</p>
            <select id="model-selector" style="margin: 10px; padding: 5px;"></select>
        </header>

        <main id="chat-history">
            <div class="message system-msg">
                Hello! I am preparing the local RxDB dataset and engine. Select a model above when ready.
            </div>
        </main>

        <div class="input-area">
            <textarea id="user-input" placeholder="Warming up engine..." disabled></textarea>
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>

 <script type="module">
    import { CreateMLCEngine, prebuiltAppConfig } from "https://esm.run/@mlc-ai/web-llm";
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.2.0';
    env.allowLocalModels = false;

   // import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/+esm";
    import { createRxDatabase } from "https://esm.run/rxdb";
    import { getRxStorageDexie } from "https://esm.run/rxdb/plugins/storage-dexie";


    // DOM Elements
    const statusText = document.getElementById('status-text');
    const chatHistory = document.getElementById('chat-history');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const modelSelector = document.getElementById('model-selector');

    let engine;
    let embedder;
    let db;

    const workerCode = `
        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0.0;
            let normA = 0.0;
            let normB = 0.0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += vecA[i] * vecB[i];
                normA += vecA[i] * vecA[i];
                normB += vecB[i] * vecB[i];
            }
            if (normA === 0 || normB === 0) return 0;
            return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        // Listen for messages from the main thread
        self.onmessage = function(e) {
            const { queryVector, docs } = e.data;

            // Run the heavy math loop
            const scoredDocs = docs.map(doc => {
                return {
                    payload: {
                        title: doc.title,
                        url: doc.url,
                        text_content: doc.text_content
                    },
                    score: cosineSimilarity(queryVector, doc.vector)
                };
            });

            // Sort and slice in the background
            const topMatches = scoredDocs
                .sort((a, b) => b.score - a.score)
                .slice(0, 4);

            // Send the final result back to the main thread
            self.postMessage(topMatches);
        };
    `;

    // 2. Instantiate the Inline Web Worker
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const searchWorker = new Worker(URL.createObjectURL(blob));

    // Cosine Similarity calculation function executing locally
    function cosineSimilarity(vecA, vecB) {
        let dotProduct = 0.0;
        let normA = 0.0;
        let normB = 0.0;
        for (let i = 0; i < vecA.length; i++) {
            dotProduct += vecA[i] * vecB[i];
            normA += vecA[i] * vecA[i];
            normB += vecB[i] * vecB[i];
        }
        if (normA === 0 || normB === 0) return 0;
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    // --- Initialize RxDB and pull items from GitHub Pages root ---
    async function initDatabase() {
        try {
            statusText.textContent = "Initializing local RxDB system...";

            db = await createRxDatabase({
                name: 'openfinancedb',
                storage: getRxStorageDexie()
            });

            const chunkSchema = {
                version: 0,
                primaryKey: 'id',
                type: 'object',
                properties: {
                    id: { type: 'string', maxLength: 100 },
                    text_content: { type: 'string' },
                    title: { type: 'string' },
                    url: { type: 'string' },
                    paginaId: { type: 'string' },
                    vector: { type: 'array', items: { type: 'number' } }
                },
                required: ['id', 'text_content', 'vector']
            };

            await db.addCollections({
                chunks: { schema: chunkSchema }
            });

            // Check if data is already inside browser storage
            const existingCount = await db.chunks.find().exec();

            if (existingCount.length === 0) {
                statusText.textContent = "RxDB syncing... downloading partitions.";

                // Dynamically import data_0.js through data_9.js
                for (let i = 0; i < 10; i++) {
                    try {
                        statusText.textContent = `Hydrating database: Loading partition ${i + 1} of 10...`;

                        // dynamic import() loads the file only when requested
                        const module = await import(`./src/data/data_${i}.js`);

                        if (module && module.chunksData) {
                            await db.chunks.bulkInsert(module.chunksData);
                        }
                    } catch (e) {
                        console.warn(`Could not load data_${i}.js. It might not exist if the dataset is small.`, e);
                        // If it fails (e.g. 404 because there were fewer than 10 files generated), we stop trying
                        break;
                    }
                }
            }

            statusText.textContent = "RxDB synced and ready. Preparing models...";
            await initModelSelector();
        } catch (err) {
            statusText.textContent = "Failed syncing data layout layers.";
            console.error(err);
        }
    }

    async function initModelSelector() {
        modelSelector.innerHTML = '';
        const defaultOption = document.createElement('option');
        defaultOption.value = "";
        defaultOption.textContent = "Selecione seu modelo";
        modelSelector.appendChild(defaultOption);

        const modelsWithStatus = await Promise.all(
            prebuiltAppConfig.model_list.map(async (model) => {
                const isCached = await (engine ? engine.hasModel(model.model_id) : false);
                return { ...model, isCached };
            })
        );

        modelsWithStatus.sort((b, a) => b.isCached - a.isCached);

        for (const model of modelsWithStatus) {
            const statusLabel = model.isCached ? " (Cached)" : " (Download)";
            const option = document.createElement('option');
            option.value = model.model_id;
            option.textContent = `${model.model_id} ${statusLabel}`;
            modelSelector.appendChild(option);
        }
    }

    // --- Initialize Engine ---
    async function initWebLLM() {
        try {
            const selectedModel = modelSelector.value;
            if(!selectedModel) return;

            statusText.textContent = `Loading ${selectedModel}...`;

            engine = await CreateMLCEngine(selectedModel, {
                initProgressCallback: (progress) => {
                    statusText.textContent = `Loading LLM: ${Math.round(progress.progress * 100)}%`;
                }
            });

            statusText.textContent = "Loading Multilingual Embedder...";
            embedder = await pipeline("feature-extraction", "Xenova/multilingual-e5-base", { dtype: "fp32" });

            statusText.textContent = "System Ready.";
            userInput.disabled = false;
            sendBtn.disabled = false;
        } catch (error) {
            statusText.textContent = "Error bootstrapping local runtime engine.";
            console.error(error);
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}-msg`;
        div.textContent = text;
        chatHistory.appendChild(div);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    // --- Execute RxDB Local Semantic Vector Search ---
    async function localRxDBSearch(queryVector) {
        const allDocs = await db.chunks.find().exec();

        // CRITICAL: Web Workers cannot accept complex objects with methods (like RxDB proxies).
        // We must map them to plain JavaScript objects before sending.
        const plainDocs = allDocs.map(doc => ({
            title: doc.title,
            url: doc.url,
            text_content: doc.text_content,
            vector: doc.vector
        }));

        // Wrap the worker event listener in a Promise so we can 'await' it in your main workflow
        return new Promise((resolve, reject) => {
            // Resolve the promise when the worker replies
            searchWorker.onmessage = (e) => resolve(e.data);
            
            // Reject if something breaks
            searchWorker.onerror = (err) => reject(err);

            // Send the data to the background thread to start the calculation
            searchWorker.postMessage({ queryVector, docs: plainDocs });
        });
    }

    // --- Main Workflow ---
    async function handleUserSubmit() {
        const query = userInput.value.trim();
        if (!query) return;

        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;

        appendMessage('user', query);
        statusText.textContent = "Refining intent parameters...";

        try {
            const refinementPrompt = `
            System: Você é um especialista em Open Finance do Banco Central do Brasil. Sua única função é reescrever a pergunta do usuário para que ela utilize a terminologia técnica, formal e regulatória correta do BACEN.
            Regras:
            Não responda à pergunta.
            Expanda siglas e termos coloquiais para suas definições legais (ex: "detentora" vira "instituição detentora de conta").
            Retorne APENAS a nova pergunta reescrita. Nenhuma outra palavra.
            User: ${query}`;

            console.log(refinementPrompt);
            const refReply = await engine.chat.completions.create({
                messages: [{ role: "user", content: refinementPrompt }],
                temperature: 0.1
            });

            const optimizedQuery = refReply.choices[0].message.content.trim();
            statusText.textContent = "Calculating local query vectors...";

            const queryForE5 = "query: " + optimizedQuery;
            const embedding = await embedder(queryForE5, { pooling: "mean", normalize: true });  
               
            const vector = Array.from(embedding.data);

            console.log("embedding: ", optimizedQuery);

            statusText.textContent = "Scanning RxDB collection layers...";
            const matches = await localRxDBSearch(vector);
            console.log("matches: ");
            console.log(matches);

            const context = matches
            .map(m => `[Fonte: ${m.payload.url}]\n${m.payload.text_content}`)
            .join("\n\n---------------------------\n\n");

            statusText.textContent = "Synthesizing localized context query...";

            const finalPrompt = `
                System: Você é um arquiteto especialista no ecossistema do Open Finance Brasil.
                Responda à pergunta do usuário utilizando estritamente as informações fornecidas no Contexto abaixo.

                Regras Obrigatórias de Resposta:
                1. Responda obrigatoriamente no idioma Português do Brasil (PT-BR).
                2. Seja claro, objetivo e técnico.
                3. Se a informação não puder ser extraída ou deduzida do contexto fornecido, diga textualmente somente o seguinte: "Não encontrei essa informação na documentação extraída."
                4. Ao final da resposta, cite explicitamente quais URLs (das fontes fornecidas no contexto) serviram de base para formular sua resposta.

                ---
                CONTEXTO:
                ${context}
                ---

                User: ${query}`;

            const finalReply = await engine.chat.completions.create({
                messages: [{ role: "user", content: finalPrompt }],
                temperature: 0.2
            });

            appendMessage('bot', finalReply.choices[0].message.content);

        } catch (error) {
            appendMessage('system', `Execution fault error: ${error.message}`);
            console.error(error);
        } finally {
            statusText.textContent = "System Ready.";
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    // --- Event Listeners ---
    sendBtn.addEventListener('click', handleUserSubmit);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleUserSubmit();
        }
    });

    modelSelector.addEventListener('change', initWebLLM);

    // Trigger initialization pipeline sequentially
    initDatabase();
    </script>
</body>

</html>
