<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Finance Brasil - RAG Search</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #004d40;
            color: white;
            padding: 20px;
            text-align: center;
        }

        #status-text {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .user-msg {
            background: #e0f2f1;
            color: #004d40;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .bot-msg {
            background: #f1f1f1;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .system-msg {
            background: #fff3e0;
            color: #e65100;
            align-self: center;
            font-size: 0.9rem;
            text-align: center;
        }

        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
            background: #fafafa;
        }

        textarea {
            flex: 1;
            resize: none;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 10px;
            height: 50px;
            font-size: 1rem;
        }

        button {
            background: #004d40;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 25px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:disabled,
        textarea:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background: #00332a;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <header>
            <h2>Open Finance Explorer</h2>
            <p id="status-text">Downloading WebLLM Model (this happens once)...</p>
            <select id="model-selector" style="margin: 10px; padding: 5px;">

            </select>
        </header>

        <main id="chat-history">
            <div class="message system-msg">
                Hello! I can answer questions about Open Finance Brasil based on BCB regulations. What would you like to
                know?
            </div>
        </main>

        <div class="input-area">
            <textarea id="user-input" placeholder="Ask about Open Finance Brasil..." disabled></textarea>
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>

    <script type="module">
        import { CreateMLCEngine, prebuiltAppConfig } from "https://esm.run/@mlc-ai/web-llm";
        import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers";
        // DOM Elements
        const statusText = document.getElementById('status-text');
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelector = document.getElementById('model-selector');

        let engine;
        let embedder;

        function estimateDownloadTime(sizeMB) {
            const speedMBs = 2.5;
            return Math.round(sizeMB / speedMBs);
        }
        var modelList = [];
        async function initModelSelector() {
            // 1. Clear existing
            modelSelector.innerHTML = '';

            const defaultOption = document.createElement('option');
            defaultOption.value = "";
            defaultOption.textContent = "Selecione seu modelo";
            modelSelector.appendChild(defaultOption);

            // 2. Prepare models with their cache status
            const modelsWithStatus = await Promise.all(
                prebuiltAppConfig.model_list.map(async (model) => {
                    const isCached = await (engine ? engine.hasModel(model.model_id) : false);
                    return { ...model, isCached };
                })
            );

            // 3. Sort: Cached models (isCached = true) come first
            modelsWithStatus.sort((a, b) => b.isCached - a.isCached);

            // 4. Populate
            for (const model of modelsWithStatus) {
                const statusLabel = model.isCached ? " (Cached)" : " (Download)";

                const option = document.createElement('option');
                option.value = model.model_id;
                option.textContent = `${model.model_id} | ${statusLabel} | ${model.low_resource_required ? 'Low Resource' : 'Standard'} | vram required: ${model.vram_required_MB} MB`;

                modelSelector.appendChild(option);
            }
        }



        // --- 1. Initialize WebLLM --
        async function initWebLLM() {
            try {
                const selectedModel = modelSelector.value;
                statusText.textContent = `Loading ${selectedModel}...`;

                engine = await CreateMLCEngine(selectedModel, {
                    initProgressCallback: (progress) => {
                        statusText.textContent = `Loading: ${Math.round(progress.progress * 100)}%`;
                    }
                });

                statusText.textContent = "Loading semantic search model...";

                embedder = await pipeline(
                    "feature-extraction",
                    "Xenova/all-MiniLM-L6-v2"
                );

                statusText.textContent = "System Ready.";
                userInput.disabled = false;
                sendBtn.disabled = false;
            } catch (error) {
                statusText.textContent = "Error loading model. Check console.";
                console.error(error);
            }
        }

        // --- Helper: Add message to UI ---
        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}-msg`;
            div.textContent = text;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function search(query) {

            const response = await fetch(
               // "https://7gqao3c4zf.execute-api.sa-east-1.amazonaws.com/production/search",
               "http://localhost:3000/api/search?query=" + query,
                {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json"
                    }
                }
            );


            return await response.json();
        }

        // --- 2. Main Workflow ---
        async function handleUserSubmit() {
            const query = userInput.value.trim();
            if (!query) return;

            // Lock UI
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            appendMessage('user', query);
            statusText.textContent = "Refining query via WebLLM...";

            try {
                // STEP A: Refine the query for MongoDB Vector Search
                const refinementPrompt = `
                Você é um arquiteto de busca semântica e um Especialista Sênior em Open Finance Brasil, com domínio absoluto da infraestrutura técnica, manuais de APIs, segurança (FAPI/OAuth2) e de toda a regulamentação do Banco Central do Brasil (BCB) e do Conselho Monetário Nacional (CMN).

                Sua tarefa é receber a pergunta conversacional de um usuário e transformá-la em uma consulta de busca altamente otimizada para bancos de dados vetoriais (Semantic Search) que indexam documentações técnicas e normativas oficiais.

                Siga estas regras estritamente:
                1. Remova ruídos conversacionais, saudações e palavras de preenchimento (ex: "olá", "por favor me explique", "como funciona").
                2. Extraia as entidades principais, verbos de ação e jargões técnicos.
                3. Expansão de Domínio Regulatório (Crucial): Traduza termos coloquiais para a nomenclatura oficial do BCB e do ecossistema Open Finance. (Exemplos: mapeie "pagamento" para "iniciação de transação de pagamento ITP", "banco" para "instituição participante", "autorização" para "consentimento").
                4. Adicione sinônimos técnicos, siglas relevantes (ex: ITP, detentor de conta, transmissor de dados, receptor) e mencione agrupamentos lógicos (ex: Fase 1, Fase 2, APIs de Consents, Resources, Payments, Resolução Conjunta) que possam estar nos documentos originais para melhorar o 'recall'.
                5. Mantenha o idioma original da pergunta.
                6. RETORNE APENAS A CONSULTA REFINADA. Não adicione explicações, aspas, ou textos de introdução.
        `;

                // const refReply = await engine.chat.completions.create({
                //     messages: [
                //         { role: "system", content: refinementPrompt },
                //         { role: "user", content: "Melhore minha pergunta: " + query }
                //     ],
                //     temperature: 0.1
                //                 });

                // const optimizedQuery = refReply.choices[0].message.content.trim();
                // console.log("Optimized Query:", optimizedQuery);


                statusText.textContent = "Searching Mongo...";
               const response = await search(query);


                const context = response
                    .map(r => `
                    Source: ${r.title}

                    URL: ${r.url}

                    ${r.text_content}
                    `)
                    .join("\n\n---------------------------\n\n");


                statusText.textContent = "Generating final answer...";

                // STEP C: Ask WebLLM to formulate the final answer using the context
                const finalPrompt = `
                            Você é um arquiteto especialista no ecossistema do Open Finance Brasil.
                    Responda à pergunta do usuário utilizando estritamente as informações fornecidas no Contexto abaixo.

                    Regras Obrigatórias de Resposta:
                    1. Responda obrigatoriamente no idioma Português do Brasil (PT-BR).
                    2. Seja claro, objetivo e técnico.
                    3. Se a informação não puder ser extraída ou deduzida do contexto fornecido, diga textualmente: "Não encontrei essa informação na documentação extraída."
                    4. Ao final da resposta, cite explicitamente quais URLs (das fontes fornecidas no contexto) serviram de base para formular sua resposta.

                    ---
                    CONTEXTO EXTRAÍDO DA DOCUMENTAÇÃO:
                    ${context}
                    ---
                            `;
                const finalReply = await engine.chat.completions.create({
                    messages: [
                        { role: "system", content: finalPrompt },
                        { role: "user", content: query }],
                    temperature: 0.5
                });

                appendMessage('bot', finalReply.choices[0].message.content);

            } catch (error) {
                appendMessage('system', `Error: ${error.message}`);
                console.error(error);
            } finally {
                // Unlock UI
                statusText.textContent = "System Ready.";
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // --- Event Listeners ---
        sendBtn.addEventListener('click', handleUserSubmit);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleUserSubmit();
            }
        });

        modelSelector.addEventListener('change', initWebLLM);
        initModelSelector();
        // Start the application
        //initWebLLM();
    </script>
</body>

</html>
