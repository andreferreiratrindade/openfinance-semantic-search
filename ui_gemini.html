<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Finance Brasil - Local AI</title>
    <style>
        :root {
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --bg-surface-hover: #27272a;
            --border-color: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #10b981;
            --accent-hover: #059669;
            --user-msg: #27272a;
            --bot-msg: transparent;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-sans);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--bg-base);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand h2 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #eab308; /* Yellow while loading */
            animation: pulse 2s infinite;
        }

        .status-dot.ready {
            background-color: var(--accent);
            animation: none;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        select {
            background: var(--bg-surface);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        select:hover, select:focus {
            border-color: var(--text-muted);
        }

        /* --- Chat Area --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            gap: 16px;
            width: 100%;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .bot-avatar { background: var(--bg-surface-hover); color: var(--accent); }
        .user-avatar { background: var(--text-main); color: var(--bg-base); }
        .system-avatar { background: rgba(234, 179, 8, 0.1); color: #eab308; }

        .msg-content {
            flex: 1;
            padding-top: 6px;
            font-size: 0.95rem;
            color: #d4d4d8;
        }

        .user-msg .msg-content { color: var(--text-main); }
        
        .system-msg .msg-content {
            color: #eab308;
            font-style: italic;
        }

        /* --- Input Area --- */
        .input-area {
            background: var(--bg-base);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid var(--border-color);
        }

        .input-container {
            width: 100%;
            max-width: 800px;
            position: relative;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-container:focus-within {
            border-color: var(--text-muted);
            box-shadow: 0 0 0 1px var(--border-color);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 16px 60px 16px 16px;
            font-size: 1rem;
            resize: none;
            height: 56px;
            outline: none;
            line-height: 1.5;
        }

        textarea:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button {
            position: absolute;
            right: 8px;
            bottom: 8px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        button svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        button:disabled {
            background: var(--bg-surface-hover);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .footer-note {
            margin-top: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Mobile tweaks */
        @media (max-width: 600px) {
            header { flex-direction: column; gap: 16px; align-items: flex-start; }
            .header-controls { width: 100%; justify-content: space-between; }
        }
    </style>
</head>

<body>
    <header>
        <div class="brand">
            <h2>Open Finance Explorer</h2>
            <span class="badge">Hybrid RAG Local</span>
        </div>
        <div class="header-controls">
            <div class="status-container">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Bootstrapping Database Architecture...</span>
            </div>
            <select id="model-selector"></select>
        </div>
    </header>

    <main>
        <div class="chat-wrapper" id="chat-history">
            <div class="message system-msg">
                <div class="avatar system-avatar">⚙️</div>
                <div class="msg-content">Hello! I am preparing the local RxDB dataset, Lexical Search, and LLM engine.</div>
            </div>
        </div>
    </main>

    <div class="input-area">
        <div class="input-container">
            <textarea id="user-input" placeholder="Warming up engine..." disabled rows="1"></textarea>
            <button id="send-btn" disabled>
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
        <span class="footer-note">AI models run entirely in your browser using WebGPU. No data is sent to external servers.</span>
    </div>

 <script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.2.0';
    env.allowLocalModels = false;

    import { createRxDatabase } from "https://esm.sh/rxdb@15.3.0?bundle";
    import { getRxStorageDexie } from "https://esm.sh/rxdb@15.3.0/plugins/storage-dexie?bundle";
    import MiniSearch from 'https://cdn.jsdelivr.net/npm/minisearch@6.3.0/dist/es/index.js';
    
    const MODEL_CONFIGS = {
        "Llama-3.2-1B-Instruct-q4f16_1-MLC": { contextWindow: 4096, maxChars: 9600, searchItems: 30 },
        "Qwen2.5-1.5B-Instruct-q4f16_1-MLC": { contextWindow: 4096, maxChars: 9600, searchItems: 30 },
        "Llama-3.2-3B-Instruct-q4f16_1-MLC": { contextWindow: 2048, maxChars: 4800, searchItems: 15 },
        "Qwen2.5-7B-Instruct-q4f16_1-MLC": { contextWindow: 1536, maxChars: 3600, searchItems: 10 },
        "Qwen2.5-0.5B-Instruct-q4f16_1-MLC": { contextWindow: 4096, maxChars: 9600, searchItems: 90 }
    };

    // DOM Elements
    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');
    const chatHistory = document.getElementById('chat-history');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const modelSelector = document.getElementById('model-selector');
    let totalItemSearched = 30;
    let MAX_CONTEXT_CHARS = 9600;
    const context_window_dinamic = 2;

    let engine;
    let embedder;
    let db;
    let miniSearch;

    // Helper to update status UI
    function updateStatus(text, isReady = false) {
        statusText.textContent = text;
        if (isReady) {
            statusDot.classList.add('ready');
            userInput.placeholder = "Ask about Open Finance...";
        } else {
            statusDot.classList.remove('ready');
        }
    }

    // --- SETUP MINISEARCH (BM25 / LEXICAL) ---
    miniSearch = new MiniSearch({
        fields: ['title', 'text_content', 'url'], // Fields to search
        storeFields: ['id', 'title', 'url', 'text_content', 'source_file', 'chunk_index'], // Fields to return
        searchOptions: {
            boost: { title: 2 }, // Give higher weight to matches in the title
            prefix: true // Allows partial word matches
        }
    });

    // --- RECIPROCAL RANK FUSION (RRF) ---
    function calculateRRF(vectorResults, lexicalResults, k = 60) {
        const rrfScores = new Map();

        // 1. Process Vector Results
        vectorResults.forEach((res, index) => {
            const docId = res.payload.id;
            const rank = index + 1;
            rrfScores.set(docId, { payload: res.payload, score: 1.0 / (k + rank) });
        });

        // 2. Process Lexical Results
        lexicalResults.forEach((res, index) => {
            const docId = res.id;
            const rank = index + 1;
            const lexicalScore = 1.0 / (k + rank);

            if (rrfScores.has(docId)) {
                rrfScores.get(docId).score += lexicalScore; 
            } else {
                rrfScores.set(docId, { payload: res, score: lexicalScore });
            }
        });

        // 3. Sort by combined RRF score and return using dynamic count
        return Array.from(rrfScores.values())
            .sort((a, b) => b.score - a.score)
            .slice(0, totalItemSearched); 
    }

    // --- FUNÇÃO DE EXPANSÃO (Small-to-Big Retrieval) ---
    async function getExpandedContext(vectorResults, myDatabase) {
        const limitedVectorResults = vectorResults.slice(0, totalItemSearched); 
        const chunksToFetchByFile = {};

        limitedVectorResults.forEach(match => {
            const file = match.source_file;
            const index = match.chunk_index;

            if (!file || index === undefined) return;
            if (!chunksToFetchByFile[file]) chunksToFetchByFile[file] = new Set();

            for (let i = -context_window_dinamic; i <= context_window_dinamic; i++) {
                chunksToFetchByFile[file].add(Math.max(1, index + i));
            }
        });

        let finalContextBlocks = [];
        let currentTotalChars = 0;

        for (const [file, indexSet] of Object.entries(chunksToFetchByFile)) {
            const uniqueIndexes = Array.from(indexSet).sort((a, b) => a - b);

            const retrievedDocs = await myDatabase.chunks.find({
                selector: { source_file: file, chunk_index: { $in: uniqueIndexes } }
            }).exec();

            retrievedDocs.sort((a, b) => a.chunk_index - b.chunk_index);
            const fileText = retrievedDocs
                .map(doc => doc.text_content.replace("passage: ", "").trim())
                .join("\n\n");

            if (currentTotalChars + fileText.length > MAX_CONTEXT_CHARS) {
                const remainingSpace = MAX_CONTEXT_CHARS - currentTotalChars;
                if (remainingSpace > 200) {
                    const truncatedBlock = fileText.substring(0, remainingSpace) + "\n...[Context truncated due to size limits]";
                    finalContextBlocks.push(truncatedBlock);
                }
                console.warn("Context limit reached based on current model capacity.");
                break;
            }

            finalContextBlocks.push(fileText);
            currentTotalChars += fileText.length;
        }

        return finalContextBlocks.join("\n\n---------------------------\n\n");
    }

    // --- WEB WORKER PARA CÁLCULO DE VETORES ---
    const workerCode = `
        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0.0;
            let normA = 0.0;
            let normB = 0.0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += vecA[i] * vecB[i];
                normA += vecA[i] * vecA[i];
                normB += vecB[i] * vecB[i];
            }
            if (normA === 0 || normB === 0) return 0;
            return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        self.onmessage = function(e) {
            const { queryVector, docs, topK } = e.data;

            const scoredDocs = docs.map(doc => {
                return {
                    payload: {
                        id: doc.id,
                        title: doc.title,
                        url: doc.url,
                        text_content: doc.text_content,
                        source_file: doc.source_file,
                        chunk_index: doc.chunk_index
                    },
                    score: cosineSimilarity(queryVector, doc.vector)
                };
            });

            const topMatches = scoredDocs
                .filter(doc => doc.score > 0.80)
                .sort((a, b) => b.score - a.score)
                .slice(0, topK);

            self.postMessage(topMatches);
        };
    `;
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const searchWorker = new Worker(URL.createObjectURL(blob));

    // --- Initialize RxDB & MiniSearch ---
    async function initDatabase() {
        try {
            updateStatus("Initializing local RxDB system...");

            db = await createRxDatabase({
                name: 'openfinancedb',
                storage: getRxStorageDexie()
            });

            const chunkSchema = {
                version: 0,
                primaryKey: 'id',
                type: 'object',
                properties: {
                    id: { type: 'string', maxLength: 100 },
                    text_content: { type: 'string' },
                    title: { type: 'string' },
                    url: { type: 'string' },
                    paginaId: { type: 'string' },
                    source_file: { type: 'string' },
                    chunk_index: { type: 'number' },
                    vector: { type: 'array', items: { type: 'number' } }
                },
                required: ['id', 'text_content', 'vector']
            };

            await db.addCollections({
                chunks: { schema: chunkSchema }
            });

            const existingCount = await db.chunks.find().exec();

            if (existingCount.length === 0) {
                for (let i = 0; i < 70; i++) {
                    try {
                        updateStatus(`Hydrating database: Loading partition ${i + 1} of 70...`);
                        const module = await import(`./src/data/data_${i}.js`);
                        if (module && module.chunksData) {
                            await db.chunks.bulkInsert(module.chunksData);
                        }
                    } catch (e) {
                        break;
                    }
                }
            }

            updateStatus("Indexing Lexical Search (BM25)...");
            const allDocs = await db.chunks.find().exec();

            const docsForLexical = allDocs.map(doc => ({
                id: doc.id,
                title: doc.title,
                text_content: doc.text_content,
                url: doc.url,
                source_file: doc.source_file,
                chunk_index: doc.chunk_index
            }));

            miniSearch.addAll(docsForLexical);

            updateStatus("Databases synced and ready. Preparing models...");
            await initModelSelector();
        } catch (err) {
            updateStatus("Failed syncing data layout layers.");
            console.error(err);
        }
    }

    async function initModelSelector() {
        modelSelector.innerHTML = '';
        const models = [
            "Llama-3.2-3B-Instruct-q4f16_1-MLC",
            "Qwen2.5-1.5B-Instruct-q4f16_1-MLC",
            "Llama-3.2-1B-Instruct-q4f16_1-MLC",
            "Qwen2.5-7B-Instruct-q4f16_1-MLC"
        ];

        models.forEach(model => {
            let option = document.createElement('option');
            option.value = model;
            option.textContent = model;
            modelSelector.appendChild(option);
        });

        initWebLLM();
    }

    // --- Initialize Engine ---
    async function initWebLLM() {
        try {
            const selectedModel = modelSelector.value;
            if(!selectedModel) return;

            const config = MODEL_CONFIGS[selectedModel] || MODEL_CONFIGS["Llama-3.2-1B-Instruct-q4f16_1-MLC"];
            
            totalItemSearched = config.searchItems;
            MAX_CONTEXT_CHARS = config.maxChars;

            if (engine) {
                updateStatus("Unloading previous model from VRAM...");
                await engine.unload();
            }

            updateStatus(`Loading ${selectedModel} (Context: ${config.contextWindow})...`);

            engine = await CreateMLCEngine(selectedModel, {
                initProgressCallback: (progress) => {
                    updateStatus(`Loading LLM: ${Math.round(progress.progress * 100)}%`);
                },
                chatOpts: {
                    context_window_size: config.contextWindow
                }
            });

            if (!embedder) {
                updateStatus("Loading Multilingual Embedder...");
                embedder = await pipeline("feature-extraction", "Xenova/multilingual-e5-small", { dtype: "q8" });
            }

            updateStatus("System Ready.", true);
            userInput.disabled = false;
            sendBtn.disabled = false;
        } catch (error) {
            updateStatus("Error bootstrapping local runtime engine.");
            console.error(error);
        }
    }

    // --- Enhanced Message Append ---
    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}-msg`;

        // Avatar
        const avatar = document.createElement('div');
        avatar.className = `avatar ${role}-avatar`;
        if (role === 'user') avatar.innerHTML = '👤';
        else if (role === 'bot') avatar.innerHTML = '✦';
        else avatar.innerHTML = '⚙️';

        // Content
        const content = document.createElement('div');
        content.className = 'msg-content';
        content.textContent = text; // Consider marked.js here if you want to parse markdown

        div.appendChild(avatar);
        div.appendChild(content);

        chatHistory.appendChild(div);
        
        // Scroll parent main element, not the inner div
        const mainScroll = document.querySelector('main');
        mainScroll.scrollTop = mainScroll.scrollHeight;
    }

    // --- Execute RxDB Local Semantic Vector Search ---
    async function localRxDBSearch(queryVector) {
        const allDocs = await db.chunks.find().exec();

        const plainDocs = allDocs.map(doc => ({
            id: doc.id,
            title: doc.title,
            url: doc.url,
            text_content: doc.text_content,
            source_file: doc.source_file,
            chunk_index: doc.chunk_index,
            vector: doc.vector
        }));

        return new Promise((resolve, reject) => {
            searchWorker.onmessage = (e) => resolve(e.data);
            searchWorker.onerror = (err) => reject(err);
            searchWorker.postMessage({ queryVector, docs: plainDocs, topK: totalItemSearched }); 
        });
    }

    // --- Main Workflow ---
    async function handleUserSubmit() {
        const originalQuery = userInput.value.trim();
        if (!originalQuery) return;

        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;

        appendMessage('user', originalQuery);
        console.log("original query: " + originalQuery);
        updateStatus("Refining intent parameters...");

        try {
            // Passo 1: Otimização de Busca (LLM)
            const refinementPrompt = `
                Papel: Você é um assistente especialista em otimização de consultas de busca...
                Entrada do Usuário: ${originalQuery}
                Saída:`;

            const refReply = await engine.chat.completions.create({
                messages: [{ role: "user", content: refinementPrompt }],
                temperature: 0.1
            });

            const optimizedQuery = refReply.choices[0].message.content.trim();
            console.log("Vector Query:", optimizedQuery);

            // Passo 2: Busca Vetorial Semântica
            updateStatus("Calculating local query vectors...");
            const queryForE5 = "query: " + optimizedQuery;
            const embedding = await embedder(queryForE5, { pooling: "mean", normalize: true });
            const vector = Array.from(embedding.data);

            updateStatus("Scanning RxDB (Semantic)...");
            const vectorMatches = await localRxDBSearch(vector);

            // Passo 3: Busca Lexical/BM25
            updateStatus("Scanning MiniSearch (Lexical)...");
            const lexicalMatches = miniSearch.search(originalQuery);
            
            // Passo 4: Reciprocal Rank Fusion (RRF)
            updateStatus("Fusing Hybrid Results...");
            const fusedMatches = calculateRRF(vectorMatches, lexicalMatches);

            if (fusedMatches.length === 0) {
                appendMessage('bot', "Não encontrei essa informação na documentação extraída.");
                updateStatus("System Ready.", true);
                userInput.disabled = false;
                sendBtn.disabled = false;
                return;
            }

            // Passo 5: Expansão Contextual
            updateStatus("Expanding semantic context neighbors...");
            const context = await getExpandedContext(fusedMatches.map(m => m.payload), db);

            // Passo 6: Geração da Resposta Final
            updateStatus("Synthesizing localized context query...");

            const finalPrompt = `
                Papel:
                    Você é um especialista em atendimento e suporte focado no ecossistema do Open Finance Brasil. Sua missão é responder às dúvidas dos usuários de forma clara, didática e segura, baseando-se EXCLUSIVAMENTE no contexto de referência fornecido.

                ---
                CONTEXTO:
                ${context}
                ---

                PERGUNTA_DO_USUÁRIO: ${originalQuery}`;

            const finalReply = await engine.chat.completions.create({
                messages: [{ role: "user", content: finalPrompt }],
                temperature: 0.1
            });

            appendMessage('bot', finalReply.choices[0].message.content);

        } catch (error) {
            appendMessage('system', `Execution fault error: ${error.message}`);
            console.error(error);
        } finally {
            updateStatus("System Ready.", true);
            userInput.disabled = false;
            sendBtn.disabled = false;
            
            // Re-focus with slight delay for mobile compatibility
            setTimeout(() => userInput.focus(), 100); 
        }
    }

    async function checkSystemSpecs() {
        const report = {
            webGpuSupported: false,
            estimatedRamGB: navigator.deviceMemory || "Unknown",
            availableStorageMB: 0,
            isCompatible: false,
            warnings: []
        };

        if (!navigator.gpu) {
            report.warnings.push("WebGPU não é suportado neste navegador.");
        } else {
            try {
                const adapter = await navigator.gpu.requestAdapter();
                if (adapter) report.webGpuSupported = true;
            } catch (e) {
                report.warnings.push("Erro ao inicializar WebGPU.");
            }
        }

        if (navigator.storage && navigator.storage.estimate) {
            const estimate = await navigator.storage.estimate();
            report.availableStorageMB = Math.round((estimate.quota - estimate.usage) / (1024 * 1024));
        }

        const hasGpu = report.webGpuSupported;
        const hasEnoughRam = report.estimatedRamGB === "Unknown" || report.estimatedRamGB >= 8;
        const hasEnoughStorage = report.availableStorageMB > 7000;

        if (hasGpu && hasEnoughRam && hasEnoughStorage) report.isCompatible = true;
        
        return report;
    }

    checkSystemSpecs().then((status) => {
        if (!status.isCompatible) {
            console.error("Bloqueado: Requisitos mínimos não atingidos.", status.warnings);
            updateStatus("Hardware incompatível detectado.", false);
        } else {
            initDatabase();
        }
    });

    sendBtn.addEventListener('click', handleUserSubmit);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleUserSubmit();
        }
    });

    modelSelector.addEventListener('change', initWebLLM);

    // Auto-resize textarea logic
    userInput.addEventListener('input', function() {
        this.style.height = '56px';
        this.style.height = (this.scrollHeight) + 'px';
        if (this.value === '') this.style.height = '56px';
    });

    </script>
