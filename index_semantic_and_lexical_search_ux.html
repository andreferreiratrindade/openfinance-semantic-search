<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Finance Brasil - RAG Search</title>
    <!-- Modern Font and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #F3F4F6;
            --bg-surface: #FFFFFF;
            --primary-teal: #006064;
            --primary-hover: #004d40;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --msg-user: #E0F2F1;
            --msg-bot: #F9FAFB;
            --msg-sys-bg: #FEF3C7;
            --msg-sys-text: #92400E;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 92vh;
            background: var(--bg-surface);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 6px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Header Styling */
        header {
            background: var(--bg-surface);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-titles {
            display: flex;
            flex-direction: column;
        }

        .header-titles h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-teal);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #status-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #status-text::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #F59E0B; /* Warning/Loading color */
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .ready #status-text::before {
            background-color: #10B981; /* Success color */
            animation: none;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        #model-selector {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-body);
            color: var(--text-main);
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        #model-selector:focus {
            border-color: var(--primary-teal);
        }

        /* Chat History */
        main {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: #FFFFFF;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .user-msg {
            background: var(--msg-user);
            color: var(--primary-hover);
            align-self: flex-end;
            border-radius: 16px 16px 4px 16px;
        }

        .bot-msg {
            background: var(--msg-bot);
            color: var(--text-main);
            align-self: flex-start;
            border-radius: 16px 16px 16px 4px;
            border: 1px solid var(--border-color);
        }

        .system-msg {
            background: var(--msg-sys-bg);
            color: var(--msg-sys-text);
            align-self: center;
            font-size: 0.8rem;
            text-align: center;
            border-radius: 20px;
            padding: 6px 16px;
            max-width: 90%;
            font-weight: 500;
        }

        /* Input Area */
        .input-area {
            display: flex;
            padding: 20px 24px;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            align-items: center;
            gap: 12px;
        }

        textarea {
            flex: 1;
            resize: none;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            height: 52px;
            font-size: 0.95rem;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: border-color 0.2s, background-color 0.2s;
            overflow-y: hidden;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-teal);
            background-color: var(--bg-surface);
            box-shadow: 0 0 0 3px rgba(0, 96, 100, 0.1);
        }

        button {
            background: var(--primary-teal);
            color: white;
            border: none;
            border-radius: 8px;
            height: 52px;
            width: 52px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button i {
            font-size: 1.2rem;
        }

        button:disabled,
        textarea:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
        
        button:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Custom Scrollbar for Main */
        main::-webkit-scrollbar {
            width: 6px;
        }
        main::-webkit-scrollbar-track {
            background: transparent;
        }
        main::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <header id="app-header">
            <div class="header-titles">
                <h2><i class="fas fa-cubes"></i> OpenFin Explorer</h2>
                <p id="status-text">Bootstrapping Database Architecture...</p>
            </div>
            <select id="model-selector"></select>
        </header>

        <main id="chat-history">
            <div class="message system-msg">
                Hello! I am preparing the local RxDB dataset, Lexical Search, and LLM engine.
            </div>
        </main>

        <div class="input-area">
            <textarea id="user-input" placeholder="Warming up engine..." disabled></textarea>
            <button id="send-btn" disabled title="Send Message">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

 <script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.2.0';
    env.allowLocalModels = false;

    import { createRxDatabase } from "https://esm.sh/rxdb@15.3.0?bundle";
    import { getRxStorageDexie } from "https://esm.sh/rxdb@15.3.0/plugins/storage-dexie?bundle";
    import MiniSearch from 'https://cdn.jsdelivr.net/npm/minisearch@6.3.0/dist/es/index.js';

    // DOM Elements
    const statusText = document.getElementById('status-text');
    const appHeader = document.getElementById('app-header');
    const chatHistory = document.getElementById('chat-history');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const modelSelector = document.getElementById('model-selector');
    const totalItemSearched = 30;
    const context_window_dinamic = 2;

    let engine;
    let embedder;
    let db;
    let miniSearch;

    // --- SETUP MINISEARCH (BM25 / LEXICAL) ---
    miniSearch = new MiniSearch({
        fields: ['title', 'text_content', 'url'], // Fields to search
        storeFields: ['id', 'title', 'url', 'text_content', 'source_file', 'chunk_index'], // Fields to return
        searchOptions: {
            boost: { title: 2 }, // Give higher weight to matches in the title
            prefix: true // Allows partial word matches
        }
    });

    // --- RECIPROCAL RANK FUSION (RRF) ---
    function calculateRRF(vectorResults, lexicalResults, k = 60) {
        const rrfScores = new Map();

        // 1. Process Vector Results
        vectorResults.forEach((res, index) => {
            const docId = res.payload.id;
            const rank = index + 1;
            rrfScores.set(docId, {
                payload: res.payload,
                score: 1.0 / (k + rank)
            });
        });

        // 2. Process Lexical Results
        lexicalResults.forEach((res, index) => {
            const docId = res.id;
            const rank = index + 1;
            const lexicalScore = 1.0 / (k + rank);

            if (rrfScores.has(docId)) {
                rrfScores.get(docId).score += lexicalScore; // Combine scores
            } else {
                rrfScores.set(docId, {
                    payload: res,
                    score: lexicalScore
                });
            }
        });

        // 3. Sort by combined RRF score and return
        return Array.from(rrfScores.values())
            .sort((a, b) => b.score - a.score)
            .slice(0, totalItemSearched);
    }

    // --- FUNÇÃO DE EXPANSÃO (Small-to-Big Retrieval) ---
    async function getExpandedContext(vectorResults, myDatabase) {
        const limitedVectorResults = vectorResults.slice(0, totalItemSearched);
        const MAX_CONTEXT_CHARS = 9600;
        const chunksToFetchByFile = {};

        limitedVectorResults.forEach(match => {
            const file = match.source_file;
            const index = match.chunk_index;

            if (!file || index === undefined) return;

            if (!chunksToFetchByFile[file]) {
                chunksToFetchByFile[file] = new Set();
            }

            for (let i = -context_window_dinamic; i <= context_window_dinamic; i++) {
                chunksToFetchByFile[file].add(Math.max(1, index + i));
            }
        });

        let finalContextBlocks = [];
        let currentTotalChars = 0;

        for (const [file, indexSet] of Object.entries(chunksToFetchByFile)) {
            const uniqueIndexes = Array.from(indexSet).sort((a, b) => a - b);

            const retrievedDocs = await myDatabase.chunks.find({
                selector: {
                    source_file: file,
                    chunk_index: {
                        $in: uniqueIndexes
                    }
                }
            }).exec();

            retrievedDocs.sort((a, b) => a.chunk_index - b.chunk_index);
            const fileText = retrievedDocs
                .map(doc => doc.text_content.replace("passage: ", "").trim())
                .join("\n\n");

            const blockText = fileText;

            if (currentTotalChars + blockText.length > MAX_CONTEXT_CHARS) {
                const remainingSpace = MAX_CONTEXT_CHARS - currentTotalChars;
                if (remainingSpace > 200) {
                    const truncatedBlock = blockText.substring(0, remainingSpace) + "\n...[Context truncated due to size limits]";
                    finalContextBlocks.push(truncatedBlock);
                }
                console.warn("Context limit reached. Some lower-ranked search matches were omitted.");
                break;
            }

            finalContextBlocks.push(blockText);
            currentTotalChars += blockText.length;
        }

        return finalContextBlocks.join("\n\n---------------------------\n\n");
    }

    // --- WEB WORKER PARA CÁLCULO DE VETORES ---
    const workerCode = `
        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0.0;
            let normA = 0.0;
            let normB = 0.0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += vecA[i] * vecB[i];
                normA += vecA[i] * vecA[i];
                normB += vecB[i] * vecB[i];
            }
            if (normA === 0 || normB === 0) return 0;
            return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        self.onmessage = function(e) {
            const { queryVector, docs } = e.data;

            const scoredDocs = docs.map(doc => {
                return {
                    payload: {
                        id: doc.id,
                        title: doc.title,
                        url: doc.url,
                        text_content: doc.text_content,
                        source_file: doc.source_file,
                        chunk_index: doc.chunk_index
                    },
                    score: cosineSimilarity(queryVector, doc.vector)
                };
            });

            const topMatches = scoredDocs
                .filter(doc => doc.score > 0.80)
                .sort((a, b) => b.score - a.score)
                .slice(0, ${totalItemSearched});

            self.postMessage(topMatches);
        };
    `;

    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const searchWorker = new Worker(URL.createObjectURL(blob));

    // --- Custom UI Function for Status ---
    function setSystemReady() {
        statusText.textContent = "System Ready.";
        appHeader.classList.add("ready");
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.placeholder = "Ask about Open Finance Brasil...";
    }
    
    function setSystemBusy(message) {
        statusText.textContent = message;
        appHeader.classList.remove("ready");
    }

    // --- Initialize RxDB & MiniSearch ---
    async function initDatabase() {
        try {
            setSystemBusy("Initializing local RxDB system...");

            db = await createRxDatabase({
                name: 'openfinancedb',
                storage: getRxStorageDexie()
            });

            const chunkSchema = {
                version: 0,
                primaryKey: 'id',
                type: 'object',
                properties: {
                    id: { type: 'string', maxLength: 100 },
                    text_content: { type: 'string' },
                    title: { type: 'string' },
                    url: { type: 'string' },
                    paginaId: { type: 'string' },
                    source_file: { type: 'string' },
                    chunk_index: { type: 'number' },
                    vector: { type: 'array', items: { type: 'number' } }
                },
                required: ['id', 'text_content', 'vector']
            };

            await db.addCollections({
                chunks: { schema: chunkSchema }
            });

            const existingCount = await db.chunks.find().exec();

            if (existingCount.length === 0) {
                setSystemBusy("RxDB syncing... downloading partitions.");

                for (let i = 0; i < 70; i++) {
                    try {
                        setSystemBusy(`Hydrating database: Loading partition ${i + 1} of 70...`);
                        const module = await import(`./src/data/data_${i}.js`);
                        if (module && module.chunksData) {
                            await db.chunks.bulkInsert(module.chunksData);
                        }
                    } catch (e) {
                        break;
                    }
                }
            }

            setSystemBusy("Indexing Lexical Search (BM25)...");
            const allDocs = await db.chunks.find().exec();

            const docsForLexical = allDocs.map(doc => ({
                id: doc.id,
                title: doc.title,
                text_content: doc.text_content,
                url: doc.url,
                source_file: doc.source_file,
                chunk_index: doc.chunk_index
            }));

            miniSearch.addAll(docsForLexical);

            setSystemBusy("Databases synced and ready. Preparing models...");
            await initModelSelector();
        } catch (err) {
            setSystemBusy("Failed syncing data layout layers.");
            console.error(err);
        }
    }

    async function initModelSelector() {
        modelSelector.innerHTML = '';
        const model = "Llama-3.2-3B-Instruct-q4f16_1-MLC";
        const defaultOption = document.createElement('option');
        defaultOption.value = model;
        defaultOption.textContent = model;
        modelSelector.appendChild(defaultOption);
        initWebLLM();
    }

    // --- Initialize Engine ---
    async function initWebLLM() {
        try {
            const selectedModel = modelSelector.value;
            if(!selectedModel) return;

            setSystemBusy(`Loading ${selectedModel}...`);

            engine = await CreateMLCEngine(selectedModel, {
                initProgressCallback: (progress) => {
                    setSystemBusy(`Loading LLM: ${Math.round(progress.progress * 100)}%`);
                },
                chatOpts: {
                    context_window_size: 4096
                }
            });

            setSystemBusy("Loading Multilingual Embedder...");
            embedder = await pipeline("feature-extraction", "Xenova/multilingual-e5-small", { dtype: "q8" });

            setSystemReady();
        } catch (error) {
            setSystemBusy("Error bootstrapping local runtime engine.");
            console.error(error);
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}-msg`;
        div.textContent = text;
        chatHistory.appendChild(div);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    // --- Execute RxDB Local Semantic Vector Search ---
    async function localRxDBSearch(queryVector) {
        const allDocs = await db.chunks.find().exec();

        const plainDocs = allDocs
            .map(doc => ({
                id: doc.id,
                title: doc.title,
                url: doc.url,
                text_content: doc.text_content,
                source_file: doc.source_file,
                chunk_index: doc.chunk_index,
                vector: doc.vector
            }));

        return new Promise((resolve, reject) => {
            searchWorker.onmessage = (e) => resolve(e.data);
            searchWorker.onerror = (err) => reject(err);
            searchWorker.postMessage({ queryVector, docs: plainDocs });
        });
    }

    // --- Main Workflow ---
    async function handleUserSubmit() {
        const originalQuery = userInput.value.trim();
        if (!originalQuery) return;

        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;

        appendMessage('user', originalQuery);
        console.log("original query: " + originalQuery)
        setSystemBusy("Refining intent parameters...");

        try {
            // Passo 1: Otimização de Busca (LLM)
            const refinementPrompt = `
                Papel:
                Você é um assistente especialista em otimização de consultas de busca. Sua tarefa é transformar entradas de conversação de usuários em consultas de busca semântica altamente eficazes, otimizadas para um banco de dados vetorial.

                Objetivo:
                Pegar a entrada bruta do usuário e reescrevê-la para maximizar a recuperação de documentos relevantes com base na similaridade de cosseno (cosine similarity) e embeddings de vetores densos.

                Instruções:
                    1. Eliminar Ruído: Remova todos os preenchimentos de conversação, saudações e palavras desnecessárias.
                    2. Extrair Conceitos Centrais: Identifique as entidades principais, ações e restrições.
                    3. Expansão de Consulta (Domínio Financeiro): Adicione de 2 a 3 sinônimos ou termos técnicos altamente relevantes.
                    4. Foco Contextual: Assuma que TODOS os documentos de destino referem-se ao Open Finance Brasil.

                Formato de Saída:
                    Retorne APENAS a string da consulta de busca otimizada. Não inclua explicações, texto introdutório ou aspas.

                Entrada do Usuário: ${originalQuery}
                Saída:`;

            const refReply = await engine.chat.completions.create({
                messages: [{ role: "user", content: refinementPrompt }],
                temperature: 0.1
            });

            const optimizedQuery = refReply.choices[0].message.content.trim();
            console.log("Vector Query:", optimizedQuery);

            // Passo 2: Busca Vetorial Semântica
            setSystemBusy("Calculating local query vectors...");
            const queryForE5 = "query: " + optimizedQuery;
            const embedding = await embedder(queryForE5, { pooling: "mean", normalize: true });
            const vector = Array.from(embedding.data);

            setSystemBusy("Scanning RxDB (Semantic)...");
            const vectorMatches = await localRxDBSearch(vector);

            // Passo 3: Busca Lexical/BM25 (MiniSearch) usando a query original
            setSystemBusy("Scanning MiniSearch (Lexical)...");
            const lexicalMatches = miniSearch.search(originalQuery);
            console.log("Lexical Matches: ", lexicalMatches);
            
            // Passo 4: Reciprocal Rank Fusion (RRF)
            setSystemBusy("Fusing Hybrid Results...");
            const fusedMatches = calculateRRF(vectorMatches, lexicalMatches);
            console.log("Hybrid RRF Top Matches:", fusedMatches);

            if (fusedMatches.length === 0) {
                appendMessage('bot', "Não encontrei essa informação na documentação extraída.");
                setSystemReady();
                return;
            }

            // Passo 5: Expansão Contextual (Small-to-Big)
            setSystemBusy("Expanding semantic context neighbors...");
            const context = await getExpandedContext(fusedMatches.map(m => m.payload), db);

            // Passo 6: Geração da Resposta Final
            setSystemBusy("Synthesizing localized context query...");

            const finalPrompt = `
                Papel:
                    Você é um especialista em atendimento e suporte focado no ecossistema do Open Finance Brasil. Sua missão é responder às dúvidas dos usuários de forma clara, didática e segura, baseando-se EXCLUSIVAMENTE no contexto de referência fornecido.

                Objetivo:
                    Utilizar as informações técnicas recuperadas da base de conhecimento (CONTEXTO) para responder à PERGUNTA_DO_USUÁRIO. A resposta deve preencher a lacuna entre o jargão técnico/regulatório e a linguagem do dia a dia.

                Instruções e Regras de Segurança:
                    Fidelidade ao Contexto: Baseie sua resposta apenas no texto fornecido na variável CONTEXTO. Não invente dados.
                    Tradução de Jargões: Explique brevemente termos técnicos para o usuário final, mantendo o tom acessível.
                    Gestão de Lacunas: Se o CONTEXTO não contiver a resposta, responda educadamente que você não possui essa informação.
                    Estrutura e Clareza: Formate a resposta para facilitar a leitura (parágrafos curtos, negrito, listas).

                ---
                CONTEXTO:
                ${context}
                ---

                PERGUNTA_DO_USUÁRIO: ${originalQuery}`;

            const finalReply = await engine.chat.completions.create({
                messages: [{ role: "user", content: finalPrompt }],
                temperature: 0.1
            });

            appendMessage('bot', finalReply.choices[0].message.content);

        } catch (error) {
            appendMessage('system', `Execution fault error: ${error.message}`);
            console.error(error);
        } finally {
            setSystemReady();
            userInput.focus();
        }
    }

    async function checkSystemSpecs() {
        const report = {
            webGpuSupported: false,
            gpuAdapterInfo: null,
            estimatedRamGB: navigator.deviceMemory || "Unknown",
            cpuCores: navigator.hardwareConcurrency || "Unknown",
            availableStorageMB: 0,
            isCompatible: false,
            warnings: []
        };

        if (!navigator.gpu) {
            report.warnings.push("WebGPU não é suportado neste navegador. Utilize o Chrome, Edge ou Brave atualizados.");
        } else {
            try {
                const adapter = await navigator.gpu.requestAdapter();
                if (adapter) {
                    report.webGpuSupported = true;
                    if (adapter.info) {
                        report.gpuAdapterInfo = {
                            architecture: adapter.info.architecture || "N/A",
                            description: adapter.info.description || "N/A",
                            vendor: adapter.info.vendor || "N/A"
                        };
                    } else {
                        report.gpuAdapterInfo = "Disponível (Detalhes omitidos por privacidade)";
                    }
                } else {
                    report.warnings.push("Nenhum adaptador WebGPU compatível encontrado no hardware.");
                }
            } catch (e) {
                report.warnings.push("Erro ao inicializar WebGPU: " + e.message);
            }
        }

        if (navigator.storage && navigator.storage.estimate) {
            const estimate = await navigator.storage.estimate();
            const availableBytes = estimate.quota - estimate.usage;
            report.availableStorageMB = Math.round(availableBytes / (1024 * 1024));
        }

        const hasGpu = report.webGpuSupported;
        const hasEnoughRam = report.estimatedRamGB === "Unknown" || report.estimatedRamGB >= 8;
        const hasEnoughStorage = report.availableStorageMB > 7000;

        if (hasGpu && hasEnoughRam && hasEnoughStorage) {
            report.isCompatible = true;
        } else {
            if (!hasEnoughRam) report.warnings.push("Memória RAM insuficiente. O sistema requer pelo menos 8GB.");
            if (!hasEnoughStorage) report.warnings.push(`Espaço em disco insuficiente. Você tem ${report.availableStorageMB}MB livres, mas precisa de pelo menos 7000MB.`);
        }

        return report;
    }

    checkSystemSpecs().then((status) => {
        console.log("--- Diagnóstico do Sistema ---", status);

        if (!status.isCompatible) {
            console.error("Bloqueado: O computador do usuário não atende aos requisitos mínimos.");
            setSystemBusy("Hardware incompatibility detected. See console.");
        } else {
            console.log("Sucesso: Hardware compatível! Inicializando RAG local...");
            initDatabase();
        }
    });

    sendBtn.addEventListener('click', handleUserSubmit);
    
    // Allow multi-line input natively, send on enter without shift
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleUserSubmit();
        }
    });

    modelSelector.addEventListener('change', initWebLLM);

    </script>
</body>
